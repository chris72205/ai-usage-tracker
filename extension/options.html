<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Usage Tracker — Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 40px auto; padding: 0 16px; color: #1a1a1a; }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 6px; }
    input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.875rem; font-family: monospace; }
    button { margin-top: 12px; padding: 8px 16px; background: #2563eb; color: #fff; border: none; border-radius: 4px; font-size: 0.875rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .status { margin-top: 10px; font-size: 0.8rem; color: #16a34a; min-height: 1em; }
    .field { margin-bottom: 20px; }
    p { font-size: 0.8rem; color: #555; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>AI Usage Tracker — Settings</h1>

  <div class="field">
    <label for="serviceUrl">Service URL</label>
    <input type="url" id="serviceUrl" placeholder="https://usage.example.com/usage">
    <p>The endpoint of your collection service.</p>
  </div>

  <div class="field">
    <label for="bearerToken">Bearer Token</label>
    <input type="password" id="bearerToken" placeholder="your-secret-token">
    <p>Must match <code>API_BEARER_TOKEN</code> on the service.</p>
  </div>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
