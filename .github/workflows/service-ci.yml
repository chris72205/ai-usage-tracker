name: Service CI

on:
  push:
    paths:
      - service/**
  pull_request:
    branches: [main]
    paths:
      - service/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: go vet
        working-directory: service
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: service
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: service/go.mod
          cache-dependency-path: service/go.sum

      - name: Build
        working-directory: service
        run: make build

      - name: Test
        working-directory: service
        run: make test
