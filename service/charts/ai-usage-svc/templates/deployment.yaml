apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-usage-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-usage-svc.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-usage-svc.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Restart pods when the secret changes
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        {{- include "ai-usage-svc.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}

      # Spread pods across kubernetes.io/arch to ensure at least 1 pod lands on
      # a non-ARM32 node alongside the RPi 3 (arm) majority.
      topologySpreadConstraints:
        - maxSkew: 2
          topologyKey: kubernetes.io/arch
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ai-usage-svc.selectorLabels" . | nindent 14 }}

      # Allow scheduling on all three architectures present in the cluster.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/arch
                    operator: In
                    values:
                      - arm
                      - arm64
                      - amd64

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "ai-usage-svc.fullname" . }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
