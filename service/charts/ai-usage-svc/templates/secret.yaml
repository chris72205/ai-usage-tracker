apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-usage-svc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-usage-svc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  PORT: {{ .Values.config.port | quote }}
  SERVICE_NAME: {{ .Values.config.serviceName | quote }}
  API_BEARER_TOKEN: {{ .Values.config.apiBearerToken | quote }}
  DEDUP_WINDOW_SECONDS: {{ .Values.config.dedupWindowSeconds | quote }}
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  RABBITMQ_URL: {{ .Values.config.rabbitmqUrl | quote }}
  RABBITMQ_EXCHANGE: {{ .Values.config.rabbitmqExchange | quote }}
  INFLUX_URL: {{ .Values.config.influxUrl | quote }}
  INFLUX_TOKEN: {{ .Values.config.influxToken | quote }}
  INFLUX_ORG: {{ .Values.config.influxOrg | quote }}
  INFLUX_BUCKET: {{ .Values.config.influxBucket | quote }}
